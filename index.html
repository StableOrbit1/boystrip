<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scotland & Ireland Golf Tour 2026</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        golf: { 900: '#064e3b', 800: '#065f46', 700: '#047857', 600: '#059669', 100: '#d1fae5', 50: '#ecfdf5' },
                        gold: { 600: '#d97706', 500: '#f59e0b', 100: '#fef3c7' }
                    }
                }
            }
        }
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        body { background-color: #f3f4f6; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        .slide-up { animation: slideUp 0.4s ease-out forwards; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 0.75rem; margin-bottom: 1.5rem; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>
</head>
<body class="antialiased">
    
    <div id="app"></div>

    <script>
        // --- SVG ICONS ---
        const icons = {
            mapPin: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"></path><circle cx="12" cy="10" r="3"></circle></svg>`,
            sunrise: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="m19.07 4.93-1.41 1.41"></path><path d="M22 17v3a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-3"></path><path d="m7 16 5-5 5 5"></path></svg>`,
            moon: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></svg>`,
            flag: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path><line x1="4" y1="22" x2="4" y2="15"></line></svg>`,
            clock: `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>`,
            info: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg>`,
            chevronLeft: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>`,
            chevronRight: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>`,
            menu: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>`
        };

        // --- APP STATE ---
        let state = {
            view: 'loading', // 'loading', 'menu', 'matches', 'singleMatch', 'itinerary'
            matches: [],
            itinerary: [],
            selectedMatchId: null,
            currentItineraryDay: 0
        };

        // --- GOOGLE SHEETS URLS ---
        const sheetUrls = {
            itinerary: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSWo3Yh7t25FQHKWbwOwlBMqlS0KvH89mCw494kbiHakFe7jbmTxHwu4V6oRwI0_E6upPCv9MgwN23i/pub?gid=0&single=true&output=csv',
            matches: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSWo3Yh7t25FQHKWbwOwlBMqlS0KvH89mCw494kbiHakFe7jbmTxHwu4V6oRwI0_E6upPCv9MgwN23i/pub?gid=2141277357&single=true&output=csv',
            holes: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSWo3Yh7t25FQHKWbwOwlBMqlS0KvH89mCw494kbiHakFe7jbmTxHwu4V6oRwI0_E6upPCv9MgwN23i/pub?gid=1612329092&single=true&output=csv'
        };

        // --- CORE FUNCTIONS ---
        const appDiv = document.getElementById('app');

        function setView(viewName, matchId = null) {
            state.view = viewName;
            if (matchId) state.selectedMatchId = matchId;
            render();
        }

        function setItineraryDay(index) {
            state.currentItineraryDay = index;
            render();
        }

        // Helper to format YouTube URLs for autoplay and mute
        const formatYouTubeUrl = (url) => {
            if (!url) return '';
            
            let videoId = '';
            if (url.includes('embed/')) {
                videoId = url.split('embed/')[1].split('?')[0];
            } else if (url.includes('youtu.be/')) {
                videoId = url.split('youtu.be/')[1].split('?')[0];
            } else if (url.includes('watch?v=')) {
                videoId = url.split('watch?v=')[1].split('&')[0];
            }
            
            return videoId ? `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1` : url;
        };

        // --- DATA FETCHING ---
        async function fetchGoogleSheetsData() {
            try {
                const fetchCSV = (url) => new Promise((resolve, reject) => {
                    Papa.parse(url, { 
                        download: true, 
                        header: true, 
                        skipEmptyLines: true, 
                        complete: (results) => resolve(results.data),
                        error: (err) => reject(err)
                    });
                });

                const [rawItinerary, rawMatches, rawHoles] = await Promise.all([
                    fetchCSV(sheetUrls.itinerary),
                    fetchCSV(sheetUrls.matches),
                    fetchCSV(sheetUrls.holes)
                ]);

                state.matches = rawMatches.map(match => ({
                    id: match.matchId, 
                    course: match.course, 
                    date: match.date, 
                    matchUp: match.matchUp, 
                    video: formatYouTubeUrl(match.video), // Apply video formatting here
                    holes: rawHoles.filter(hole => hole.matchId === match.matchId).map(hole => ({
                        number: parseInt(hole.number), name: hole.name, par: parseInt(hole.par), yardage: parseInt(hole.yardage), tip: hole.tip
                    }))
                }));

                state.itinerary = rawItinerary.map(day => ({
                    day: day.day, date: day.date, country: day.country, wakeUp: day.wakeUp, sleep: day.sleep, quote: day.quote,
                    golf: state.matches.filter(m => m.date === day.date).map(m => ({ course: m.course, time: "TBD", matchId: m.id })),
                    schedule: [], 
                    intel: { city: day.intel_city, description: day.intel_desc, hotel: day.intel_hotel, hotspots: day.intel_hotspots ? day.intel_hotspots.split('|') : [] }
                }));

                setView('menu');
            } catch (error) {
                console.error("Error fetching data. Check CSV URLs.", error);
                appDiv.innerHTML = `<div class="min-h-screen flex items-center justify-center bg-red-900 text-white p-6 text-center">Error loading data. Check console.</div>`;
            }
        }

        // --- RENDER VIEWS ---
        function render() {
            if (state.view === 'loading') {
                appDiv.innerHTML = `<div class="min-h-screen flex flex-col items-center justify-center bg-golf-900 text-white font-serif text-2xl fade-in">Loading Tour Intel...</div>`;
            } else if (state.view === 'menu') {
                appDiv.innerHTML = renderMainMenu();
            } else if (state.view === 'matches') {
                appDiv.innerHTML = renderMatchList();
            } else if (state.view === 'singleMatch') {
                appDiv.innerHTML = renderSingleMatch();
            } else if (state.view === 'itinerary') {
                appDiv.innerHTML = renderItinerary();
                attachSwipeListeners();
            }
        }

        const renderFooter = () => `<footer class="text-center py-6 text-slate-400 text-xs border-t border-slate-200 mt-8">&copy; 2026 FAKC &bull; Flatson Ass Kicking Corp</footer>`;

        function renderMainMenu() {
            return `
                <div class="min-h-screen flex flex-col justify-center items-center bg-golf-900 text-white p-6 fade-in">
                    <div class="max-w-md w-full space-y-8 text-center slide-up">
                        <div>
                            <h1 class="text-4xl md:text-5xl font-serif font-bold tracking-wide mb-2">Scotland & Ireland</h1>
                            <p class="text-gold-500 font-semibold uppercase tracking-widest">Golf Tour 2026</p>
                        </div>
                        <div class="space-y-4 pt-8">
                            <button onclick="setView('matches')" class="w-full bg-white text-golf-900 py-4 px-6 rounded-xl font-bold text-lg shadow-lg hover:bg-golf-50 transition transform hover:scale-105">View the Golf Matches</button>
                            <button onclick="setView('itinerary')" class="w-full bg-transparent border-2 border-gold-500 text-gold-500 py-4 px-6 rounded-xl font-bold text-lg shadow-lg hover:bg-gold-500 hover:text-golf-900 transition transform hover:scale-105">View the Itinerary</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderMatchList() {
            let html = `
                <div class="min-h-screen flex flex-col bg-slate-50 fade-in">
                    <header class="bg-golf-900 text-white shadow-md p-4 flex items-center justify-between sticky top-0 z-20">
                        <button onclick="setView('menu')" class="text-golf-100 hover:text-white">${icons.menu}</button>
                        <h1 class="font-serif font-bold text-xl">The Golf Matches</h1>
                        <div class="w-6"></div>
                    </header>
                    <main class="flex-grow max-w-3xl w-full mx-auto p-4 space-y-4 mt-4">
            `;
            
            state.matches.forEach(match => {
                html += `
                    <button onclick="setView('singleMatch', '${match.id}')" class="w-full bg-white rounded-2xl shadow-sm border border-slate-200 p-5 text-left hover:shadow-md transition-shadow flex justify-between items-center group">
                        <div>
                            <p class="text-xs font-bold text-golf-600 uppercase tracking-widest mb-1">${match.date}</p>
                            <h3 class="font-serif font-bold text-xl text-slate-800">${match.course}</h3>
                            <p class="text-sm text-slate-500 mt-1">${match.matchUp}</p>
                        </div>
                        <div class="text-golf-300 group-hover:text-golf-700 transition-colors">${icons.chevronRight}</div>
                    </button>
                `;
            });

            html += `</main>${renderFooter()}</div>`;
            return html;
        }

        function renderSingleMatch() {
            const match = state.matches.find(m => m.id === state.selectedMatchId);
            let html = `
                <div class="min-h-screen flex flex-col bg-slate-50 fade-in">
                    <header class="bg-golf-900 text-white shadow-md p-4 flex items-center justify-between sticky top-0 z-20">
                        <button onclick="setView('matches')" class="flex items-center text-golf-100 hover:text-white">
                            ${icons.chevronLeft} <span class="ml-1 font-semibold">Matches</span>
                        </button>
                        <h1 class="font-serif font-bold text-lg truncate px-2">${match.course}</h1>
                        <div class="w-8"></div>
                    </header>
                    <main class="flex-grow max-w-3xl w-full mx-auto p-4">
                        <div class="text-center mb-6">
                            <p class="text-golf-600 font-bold uppercase tracking-wider text-sm">${match.date}</p>
                            <h2 class="text-2xl font-serif font-bold text-slate-800">${match.matchUp}</h2>
                        </div>
            `;

            if (match.video) {
                // Video rendering unchanged, since the URL is formatted during the fetch
                html += `
                    <div class="video-container shadow-lg">
                        <iframe src="${match.video}" title="Course Video" frameborder="0" allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                    </div>
                `;
            }

            html += `<div class="space-y-4 mt-6">`;
            match.holes.forEach(hole => {
                html += `
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4">
                        <div class="flex justify-between items-center mb-3 border-b border-slate-100 pb-2">
                            <div class="flex items-center space-x-3">
                                <div class="bg-golf-800 text-white w-8 h-8 rounded-full flex items-center justify-center font-bold">${hole.number}</div>
                                <div><h3 class="font-bold text-slate-800">${hole.name}</h3></div>
                            </div>
                            <div class="text-right">
                                <p class="text-sm font-bold text-slate-500">Par ${hole.par}</p>
                                <p class="text-xs text-slate-400">${hole.yardage} yds</p>
                            </div>
                        </div>
                        <div class="bg-slate-50 rounded-lg p-3 text-sm text-slate-600 border border-slate-100 italic">
                            <span class="font-bold text-golf-700 not-italic">Caddie Tip: </span>${hole.tip}
                        </div>
                    </div>
                `;
            });

            html += `</div></main>${renderFooter()}</div>`;
            return html;
        }

        function renderItinerary() {
            const dayData = state.itinerary[state.currentItineraryDay];
            
            let html = `
                <div class="min-h-screen flex flex-col font-sans text-slate-800 fade-in bg-slate-50">
                    <header class="bg-golf-900 text-white shadow-md relative z-10 flex items-center p-4">
                        <button onclick="setView('menu')" class="text-golf-100 hover:text-white absolute left-4">${icons.menu}</button>
                        <div class="w-full text-center">
                            <h1 class="text-xl md:text-2xl font-serif font-bold tracking-wide">Tour Itinerary</h1>
                            <p class="text-golf-100 text-xs md:text-sm mt-1">June 6 – June 17, 2026</p>
                        </div>
                    </header>

                    <div class="bg-white shadow-sm border-b border-slate-200 sticky top-0 z-20">
                        <div class="max-w-4xl mx-auto px-2 py-3 flex overflow-x-auto hide-scrollbar snap-x snap-mandatory">
            `;

            state.itinerary.forEach((d, idx) => {
                const activeClass = state.currentItineraryDay === idx ? 'bg-golf-800 text-white shadow-md' : 'bg-slate-100 text-slate-500 hover:bg-slate-200';
                html += `<button onclick="setItineraryDay(${idx})" class="flex-shrink-0 snap-center mx-1 px-4 py-2 rounded-full text-sm font-semibold transition-colors duration-200 whitespace-nowrap ${activeClass}">${d.date}</button>`;
            });

            html += `
                        </div>
                    </div>
                    
                    <main id="swipe-container" class="flex-grow max-w-4xl w-full mx-auto p-4 md:p-6 overflow-hidden">
                        <div class="flex justify-between items-center mb-6">
                            <button onclick="setItineraryDay(Math.max(0, ${state.currentItineraryDay - 1}))" class="p-2 rounded-full ${state.currentItineraryDay === 0 ? 'text-slate-300' : 'text-golf-800 hover:bg-golf-50'}" ${state.currentItineraryDay === 0 ? 'disabled' : ''}>${icons.chevronLeft}</button>
                            <div class="text-center w-full fade-in" key="${state.currentItineraryDay}">
                                <h2 class="text-xl md:text-2xl font-serif font-bold">${dayData.day}, ${dayData.date}</h2>
                                <p class="text-xs font-bold text-gold-600 mt-1">${dayData.country}</p>
                            </div>
                            <button onclick="setItineraryDay(Math.min(${state.itinerary.length - 1}, ${state.currentItineraryDay + 1}))" class="p-2 rounded-full ${state.currentItineraryDay === state.itinerary.length - 1 ? 'text-slate-300' : 'text-golf-800 hover:bg-golf-50'}" ${state.currentItineraryDay === state.itinerary.length - 1 ? 'disabled' : ''}>${icons.chevronRight}</button>
                        </div>

                        <div class="space-y-6 fade-in">
                            <div class="text-center px-4 py-2 border-l-4 border-gold-500 bg-white shadow-sm rounded-r-lg italic text-slate-600 text-sm">"${dayData.quote}"</div>
                            
                            <div class="grid grid-cols-2 gap-4">
                                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex items-center space-x-3">
                                    <div class="bg-amber-100 p-2 rounded-lg text-amber-600">${icons.sunrise}</div>
                                    <div><p class="text-xs text-slate-400 uppercase tracking-wider font-semibold">Wake Up</p><p class="font-bold text-slate-800">${dayData.wakeUp}</p></div>
                                </div>
                                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex items-center space-x-3">
                                    <div class="bg-indigo-100 p-2 rounded-lg text-indigo-600">${icons.moon}</div>
                                    <div><p class="text-xs text-slate-400 uppercase tracking-wider font-semibold">Sleep In</p><p class="font-bold text-slate-800">${dayData.sleep}</p></div>
                                </div>
                            </div>
            `;

            if (dayData.golf.length > 0) {
                html += `
                    <div class="bg-golf-800 text-white rounded-2xl shadow-lg overflow-hidden">
                        <div class="px-5 py-4 border-b border-golf-700 bg-golf-900 flex items-center space-x-2">
                            ${icons.flag} <h3 class="font-serif font-bold text-lg">Golf Today</h3>
                        </div>
                        <div class="p-2">
                `;
                dayData.golf.forEach(g => {
                    html += `
                        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center bg-golf-700 rounded-xl p-4 m-2">
                            <div class="mb-2 sm:mb-0">
                                <h4 class="font-bold text-lg text-golf-50">${g.course}</h4>
                                ${g.matchId 
                                    ? `<button onclick="setView('singleMatch', '${g.matchId}')" class="flex items-center text-gold-400 hover:text-gold-300 text-sm mt-1 space-x-1 font-semibold group">${icons.clock} <span class="underline group-hover:no-underline">Tee Time: ${g.time} (Tap Info)</span></button>`
                                    : `<div class="flex items-center text-golf-100 text-sm mt-1 space-x-1">${icons.clock} <span>${g.time}</span></div>`
                                }
                            </div>
                        </div>
                    `;
                });
                html += `</div></div>`;
            }

            html += `
                            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
                                <div class="flex items-center space-x-2 mb-3 text-golf-800">${icons.info} <h3 class="font-serif font-bold text-lg">Local Intel: ${dayData.intel.city}</h3></div>
                                <p class="text-slate-600 text-sm mb-4 leading-relaxed">${dayData.intel.description}</p>
                                <div class="mb-4">
                                    <h4 class="text-xs uppercase tracking-wider font-bold text-slate-400 mb-2">Accommodation</h4>
                                    <p class="text-slate-800 font-medium flex items-center"><span class="text-golf-600 mr-2">${icons.mapPin}</span>${dayData.intel.hotel}</p>
                                </div>
            `;

            if (dayData.intel.hotspots && dayData.intel.hotspots.length > 0) {
                html += `<div><h4 class="text-xs uppercase tracking-wider font-bold text-slate-400 mb-2">Bars & Restaurants</h4><ul class="space-y-2">`;
                dayData.intel.hotspots.forEach(spot => {
                    html += `<li class="text-sm text-slate-700 flex items-start"><span class="text-gold-500 mr-2 mt-0.5">&bull;</span>${spot}</li>`;
                });
                html += `</ul></div>`;
            }

            html += `</div></div></main>${renderFooter()}</div>`;
            return html;
        }

        // --- SWIPE LOGIC ---
        function attachSwipeListeners() {
            const container = document.getElementById('swipe-container');
            if (!container) return;

            let touchStartX = 0;
            let touchEndX = 0;

            container.addEventListener('touchstart', e => {
                touchStartX = e.changedTouches[0].screenX;
            }, {passive: true});

            container.addEventListener('touchend', e => {
                touchEndX = e.changedTouches[0].screenX;
                handleSwipe();
            }, {passive: true});

            function handleSwipe() {
                const threshold = 50;
                if (touchEndX < touchStartX - threshold && state.currentItineraryDay < state.itinerary.length - 1) {
                    setItineraryDay(state.currentItineraryDay + 1); // Swipe left (next)
                }
                if (touchEndX > touchStartX + threshold && state.currentItineraryDay > 0) {
                    setItineraryDay(state.currentItineraryDay - 1); // Swipe right (prev)
                }
            }
        }

        // --- BOOTSTRAP ---
        // Fetch and load the data immediately
        fetchGoogleSheetsData();

    </script>
</body>
</html>
