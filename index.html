<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoysTrip.</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&family=Yellowtail&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                        script: ['Yellowtail', 'cursive'],
                    },
                    colors: {
                        golf: {
                            900: '#064e3b',
                            800: '#065f46',
                            700: '#047857',
                            600: '#059669',
                            100: '#d1fae5',
                            50: '#ecfdf5'
                        },
                        gold: {
                            600: '#d97706',
                            500: '#f59e0b',
                            400: '#fbbf24',
                            100: '#fef3c7'
                        }
                    }
                }
            }
        }
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { background-color: #f3f4f6; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        .slide-up { animation: slideUp 0.4s ease-out forwards; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 1.25rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- ICONS ---
        const IconMapPin = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"></path><circle cx="12" cy="10" r="3"></circle></svg>;
        const IconSunrise = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="m19.07 4.93-1.41 1.41"></path><path d="M22 17v3a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-3"></path><path d="m7 16 5-5 5 5"></path></svg>;
        const IconMoon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></svg>;
        const IconFlag = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path><line x1="4" y1="22" x2="4" y2="15"></line></svg>;
        const IconClock = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
        const IconInfo = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg>;
        const IconChevronLeft = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>;
        const IconChevronRight = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>;
        const IconMenu = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>;
        const IconDatabase = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M3 5V19A9 3 0 0 0 21 19V5"></path><path d="M3 12A9 3 0 0 0 21 12"></path></svg>;

        // --- LOGO COMPONENT ---
        const BoysTripLogo = ({ className = "h-20" }) => (
            <img 
                src="logo.png" 
                alt="BoysTrip Logo" 
                className={`mx-auto object-contain drop-shadow-md ${className}`} 
            />
        );

        // --- BACKGROUND COMPONENT ---
        const PatternBackground = () => {
            const items = Array.from({ length: 150 });
            return (
                <div className="absolute inset-0 pointer-events-none overflow-hidden flex flex-wrap content-start gap-8 p-4 opacity-[0.07] justify-center">
                    {items.map((_, i) => (
                        <div key={i} className="text-white rotate-12">
                            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                {i % 2 === 0 ? (
                                    <g><path d="M17 3 7 21"></path><path d="M8 20c-2 0-3.5-1-3-2.5s2.5-1 4 .5"></path></g>
                                ) : (
                                    <g><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path><line x1="4" y1="22" x2="4" y2="15"></line></g>
                                )}
                            </svg>
                        </div>
                    ))}
                </div>
            );
        };

        const CopyrightFooter = () => (
            <footer className="text-center py-6 text-slate-400 text-xs border-t border-slate-200 mt-8">
                &copy; 2026 FAKC &bull; Flatson Ass Kicking Corp
            </footer>
        );

        // --- VIEWS ---

        const ConfigView = ({ onSave, initialId, error }) => {
            const [inputId, setInputId] = useState(initialId || '');
            return (
                <div className="relative min-h-screen flex flex-col justify-center items-center bg-golf-900 text-white p-6 fade-in overflow-hidden">
                    <PatternBackground />
                    <div className="relative z-10 max-w-md w-full space-y-8 slide-up">
                        <div className="text-center">
                            <BoysTripLogo className="h-24 md:h-28 mb-4" />
                            <p className="text-gold-500 font-semibold uppercase tracking-widest text-xs">Database Connection</p>
                        </div>
                        <div className="bg-white/10 p-6 rounded-[2rem] border border-white/20 backdrop-blur-md">
                            <label className="block text-sm font-medium text-golf-100 mb-2">Google Sheet ID</label>
                            <input 
                                type="text" 
                                value={inputId}
                                onChange={(e) => setInputId(e.target.value)}
                                placeholder="Paste Sheet ID..."
                                className="w-full bg-white/5 border border-white/30 text-white rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-gold-500 placeholder-white/30"
                            />
                            {error && <p className="text-red-400 text-sm mt-2 font-bold">{error}</p>}
                            <button 
                                onClick={() => onSave(inputId)}
                                className="w-full mt-6 bg-gold-500 text-golf-900 py-3 px-6 rounded-xl font-black text-lg shadow-lg hover:bg-gold-400 transition"
                            >
                                CONNECT
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const MainMenu = ({ setView, clearConfig, settings }) => (
            <div className="min-h-screen flex flex-col justify-center items-center bg-golf-900 text-white p-6 fade-in relative overflow-hidden">
                <PatternBackground />
                <button onClick={clearConfig} className="absolute top-6 right-6 text-golf-100/50 hover:text-white transition z-20"><IconDatabase /></button>
                <div className="relative z-10 max-w-md w-full space-y-8 text-center slide-up">
                    <div>
                        {settings.TourName ? (
                            <h1 className="text-5xl md:text-7xl font-script tracking-wide mb-2 text-white drop-shadow-lg">{settings.TourName}</h1>
                        ) : (
                            <BoysTripLogo className="h-28 md:h-36 mb-4" />
                        )}
                        <p className="text-gold-500 font-semibold uppercase tracking-widest text-sm">{settings.TourYear || 'Golf Tour 2026'}</p>
                    </div>
                    <div className="space-y-4 pt-8">
                        <button onClick={() => setView('matches')} className="w-full bg-white text-golf-900 py-5 px-6 rounded-2xl font-black text-xl shadow-xl hover:bg-golf-50 transition transform hover:scale-105">View Matches</button>
                        <button onClick={() => setView('itinerary')} className="w-full bg-transparent border-2 border-gold-500 text-gold-500 py-5 px-6 rounded-2xl font-black text-xl shadow-xl hover:bg-gold-500 hover:text-golf-900 transition transform hover:scale-105">View Itinerary</button>
                    </div>
                </div>
            </div>
        );

        const MatchesView = ({ setView, selectedMatch, setSelectedMatch, matches }) => {
            if (selectedMatch) {
                const match = matches.find(m => m.id === selectedMatch);
                return (
                    <div className="min-h-screen flex flex-col bg-slate-50 fade-in">
                        <header className="bg-golf-900 text-white p-4 flex items-center justify-between sticky top-0 z-20 shadow-md">
                            <button onClick={() => setSelectedMatch(null)} className="flex items-center text-golf-100"><IconChevronLeft /></button>
                            <h1 className="font-serif font-bold text-lg">{match.course}</h1>
                            <div className="w-8"></div>
                        </header>
                        <main className="flex-grow max-w-2xl w-full mx-auto p-4">
                            <div className="text-center mb-6">
                                <p className="text-golf-600 font-black uppercase tracking-widest text-xs mb-1">{match.date}</p>
                                <h2 className="text-3xl font-serif font-bold text-slate-800">{match.matchUp}</h2>
                            </div>
                            {match.video && (
                                <div className="video-container">
                                    <iframe src={match.video} frameBorder="0" allowFullScreen></iframe>
                                </div>
                            )}
                            <div className="space-y-4">
                                {match.holes.map((hole) => (
                                    <div key={hole.number} className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
                                        <div className="flex justify-between items-center mb-4 border-b pb-3">
                                            <div className="flex items-center gap-4">
                                                <div className="bg-golf-800 text-white w-10 h-10 rounded-xl flex items-center justify-center font-black text-lg">{hole.number}</div>
                                                <h3 className="font-bold text-slate-800 text-lg">{hole.name || `Hole ${hole.number}`}</h3>
                                            </div>
                                            <div className="text-right">
                                                <p className="text-sm font-black text-golf-700">Par {hole.par}</p>
                                                <p className="text-xs text-slate-400 font-bold">{hole.yardage} yds</p>
                                            </div>
                                        </div>
                                        {hole.tip && <div className="bg-slate-50 rounded-xl p-4 text-sm text-slate-600 border border-slate-100 italic leading-relaxed"><span className="font-black text-golf-700 not-italic uppercase text-[10px] block mb-1">Caddie Tip</span>{hole.tip}</div>}
                                    </div>
                                ))}
                            </div>
                        </main>
                        <CopyrightFooter />
                    </div>
                );
            }
            return (
                <div className="min-h-screen flex flex-col bg-slate-50 fade-in">
                    <header className="bg-golf-900 text-white p-5 flex items-center justify-between sticky top-0 z-20 shadow-lg">
                        <button onClick={() => setView('menu')} className="text-golf-100"><IconMenu /></button>
                        <h1 className="font-serif font-black text-xl tracking-tight">The Matches</h1>
                        <div className="w-6"></div>
                    </header>
                    <main className="flex-grow max-w-xl w-full mx-auto p-4 space-y-4 mt-4">
                        {matches.map((match) => (
                            <button key={match.id} onClick={() => setSelectedMatch(match.id)} className="w-full bg-white rounded-3xl shadow-sm border border-slate-200 p-6 text-left hover:shadow-lg transition-all flex justify-between items-center group">
                                <div>
                                    <p className="text-[10px] font-black text-golf-600 uppercase tracking-[0.2em] mb-1">{match.date}</p>
                                    <h3 className="font-serif font-bold text-2xl text-slate-800 group-hover:text-golf-800 transition-colors">{match.course}</h3>
                                    <p className="text-sm font-medium text-slate-400 mt-1">{match.matchUp}</p>
                                </div>
                                <div className="text-gold-300 group-hover:text-golf-700 transition-colors"><IconChevronRight /></div>
                            </button>
                        ))}
                    </main>
                    <CopyrightFooter />
                </div>
            );
        };

        const ItineraryView = ({ setView, goToMatch, itinerary, settings }) => {
            const [currentDay, setCurrentDay] = useState(0);
            if (itinerary.length === 0) return null;
            const dayData = itinerary[currentDay];
            return (
                <div className="min-h-screen flex flex-col bg-slate-50 fade-in">
                    <header className="bg-golf-900 text-white p-5 flex items-center justify-center relative shadow-xl">
                        <button onClick={() => setView('menu')} className="absolute left-5 text-golf-100"><IconMenu /></button>
                        <div className="text-center">
                            <h1 className="text-2xl font-serif font-bold tracking-tight">Tour Itinerary</h1>
                            <p className="text-[10px] font-black text-gold-500 uppercase tracking-[0.2em] mt-1">{settings.TourName || 'BoysTrip.'}</p>
                        </div>
                    </header>
                    <div className="bg-white border-b sticky top-0 z-20 overflow-x-auto hide-scrollbar flex p-3 gap-2">
                        {itinerary.map((d, idx) => (
                            <button key={idx} onClick={() => setCurrentDay(idx)} className={`flex-shrink-0 px-5 py-2 rounded-full text-xs font-black transition-all ${currentDay === idx ? 'bg-golf-800 text-white shadow-lg' : 'bg-slate-100 text-slate-400'}`}>{d.date}</button>
                        ))}
                    </div>
                    <main className="flex-grow max-w-xl w-full mx-auto p-4 md:p-6 pb-20">
                        <div className="flex justify-between items-center mb-8">
                            <button onClick={() => setCurrentDay(p => Math.max(0, p-1))} className={`p-2 rounded-full ${currentDay === 0 ? 'text-slate-200' : 'text-golf-800 bg-white shadow-sm'}`} disabled={currentDay === 0}><IconChevronLeft /></button>
                            <div className="text-center">
                                <h2 className="text-3xl font-serif font-bold text-slate-800">{dayData.day}, {dayData.date}</h2>
                                <p className="text-[10px] font-black text-emerald-600 tracking-[0.3em] uppercase mt-1">{dayData.country}</p>
                            </div>
                            <button onClick={() => setCurrentDay(p => Math.min(itinerary.length-1, p+1))} className={`p-2 rounded-full ${currentDay === itinerary.length-1 ? 'text-slate-200' : 'text-golf-800 bg-white shadow-sm'}`} disabled={currentDay === itinerary.length-1}><IconChevronRight /></button>
                        </div>
                        <div className="space-y-6">
                            {dayData.quote && <div className="text-center p-6 bg-white rounded-3xl shadow-sm border-l-8 border-gold-500 italic text-slate-600 text-lg leading-relaxed">"{dayData.quote}"</div>}
                            <div className="grid grid-cols-2 gap-4">
                                <div className="bg-white p-5 rounded-[2rem] shadow-sm flex items-center gap-4">
                                    <div className="bg-amber-100 p-3 rounded-2xl text-amber-600"><IconSunrise /></div>
                                    <div><p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Wake Up</p><p className="font-bold text-slate-800 leading-tight">{dayData.wakeUp}</p></div>
                                </div>
                                <div className="bg-white p-5 rounded-[2rem] shadow-sm flex items-center gap-4">
                                    <div className="bg-indigo-100 p-3 rounded-2xl text-indigo-600"><IconMoon /></div>
                                    <div><p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Sleep In</p><p className="font-bold text-slate-800 leading-tight">{dayData.sleep}</p></div>
                                </div>
                            </div>
                            {dayData.golf.map((g, idx) => (
                                <div key={idx} className="bg-golf-800 text-white rounded-[2.5rem] shadow-xl overflow-hidden">
                                    <div className="p-6 bg-golf-900 border-b border-golf-700 flex items-center gap-3"><IconFlag /><h3 className="font-serif font-bold text-xl">Golf Today</h3></div>
                                    <div className="p-6">
                                        <h4 className="font-bold text-2xl text-white mb-2">{g.course}</h4>
                                        {g.matchId ? (
                                            <button onClick={() => goToMatch(g.matchId)} className="flex items-center gap-2 bg-gold-500 text-golf-900 px-6 py-3 rounded-2xl font-black text-sm shadow-lg hover:bg-gold-400 transition">
                                                <IconClock /> TEE TIME: {g.time} — TAP FOR CADDY BOOK
                                            </button>
                                        ) : (
                                            <div className="flex items-center gap-2 text-golf-100 font-bold"><IconClock /> {g.time}</div>
                                        )}
                                    </div>
                                </div>
                            ))}
                            {dayData.schedule.length > 0 && (
                                <div className="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 p-8">
                                    <h3 className="font-serif font-bold text-2xl mb-6 text-slate-800 border-b pb-4">Daily Schedule</h3>
                                    <div className="space-y-6">
                                        {dayData.schedule.map((item, idx) => (
                                            <div key={idx} className="flex gap-6">
                                                <div className="w-20 shrink-0 text-xs font-black text-slate-400 mt-1">{item.time}</div>
                                                <div className="border-l-2 border-slate-100 pl-6 pb-2"><p className="text-slate-800 font-bold text-lg leading-tight">{item.event}</p></div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                            {dayData.intel.city && (
                                <div className="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 p-8">
                                    <div className="flex items-center gap-3 mb-4 text-golf-800"><IconInfo /><h3 className="font-serif font-bold text-2xl">Local Recon: {dayData.intel.city}</h3></div>
                                    <p className="text-slate-600 leading-relaxed mb-6">{dayData.intel.description}</p>
                                    {dayData.intel.hotel && <div className="mb-6"><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Basecamp</p><p className="font-bold text-slate-800 flex items-center gap-2"><IconMapPin /> {dayData.intel.hotel}</p></div>}
                                    {dayData.intel.hotspots.length > 0 && (
                                        <div>
                                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">Bars & Dining</p>
                                            <div className="flex flex-wrap gap-2">{dayData.intel.hotspots.map((spot, idx) => <span key={idx} className="bg-slate-50 border border-slate-100 text-slate-700 px-4 py-2 rounded-xl text-sm font-bold shadow-sm">{spot}</span>)}</div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </main>
                    <CopyrightFooter />
                </div>
            );
        };

        const fetchSheet = async (id, name) => {
            const url = `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json&sheet=${name}`;
            const res = await fetch(url);
            const text = await res.text();
            const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S\w]+)\)/)[1]);
            const cols = json.table.cols.map(c => c ? c.label : '');
            return json.table.rows.map(r => {
                const obj = {};
                r.c.forEach((cell, i) => { if(cols[i]) obj[cols[i]] = cell ? cell.v : null; });
                return obj;
            });
        };

        const App = () => {
            const [sheetId, setSheetId] = useState(localStorage.getItem('golfSheetId') || '');
            const [isLoaded, setIsLoaded] = useState(false);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [itinerary, setItinerary] = useState([]);
            const [matches, setMatches] = useState([]);
            const [settings, setSettings] = useState({});
            const [view, setView] = useState('menu');
            const [match, setMatch] = useState(null);

            useEffect(() => { if(sheetId) load(sheetId); }, []);

            const load = async (id) => {
                setLoading(true); setError('');
                try {
                    const [rawI, rawS, rawM, rawH, rawSet] = await Promise.all([
                        fetchSheet(id, 'Itinerary'), fetchSheet(id, 'Schedule'),
                        fetchSheet(id, 'Matches'), fetchSheet(id, 'Holes'), fetchSheet(id, 'Settings')
                    ]);
                    const setObj = {}; rawSet.forEach(r => setObj[r.Key] = r.Value);
                    const holesByM = rawH.reduce((acc,h) => { (acc[h.MatchID] = acc[h.MatchID] || []).push(h); return acc; }, {});
                    const formattedM = rawM.map(m => ({ id: m.MatchID, course: m.Course, date: m.Date, matchUp: m.MatchUp, video: m.VideoURL, holes: (holesByM[m.MatchID] || []).sort((a,b)=>a.HoleNumber-b.HoleNumber) }));
                    const schedByD = rawS.reduce((acc,s) => { (acc[s.Date] = acc[s.Date] || []).push(s); return acc; }, {});
                    const formattedI = rawI.map(d => ({
                        day: d.Day, date: d.Date, country: d.Country, wakeUp: d.WakeUpCity, sleep: d.SleepCity, quote: d.Quote,
                        golf: (schedByD[d.Date] || []).filter(s => s.IsGolf && s.IsGolf.toLowerCase()==='yes').map(s=>({ course: s.CourseName, time: s.Time, matchId: s.MatchID })),
                        schedule: (schedByD[d.Date] || []).filter(s => !s.IsGolf || s.IsGolf.toLowerCase()!=='yes').map(s=>({ time: s.Time, event: s.Event })),
                        intel: { city: d.IntelCity, description: d.IntelDescription, hotel: d.Hotel, hotspots: d.Hotspots ? d.Hotspots.split('|').map(s=>s.trim()) : [] }
                    }));
                    setSettings(setObj); setMatches(formattedM); setItinerary(formattedI);
                    setSheetId(id); localStorage.setItem('golfSheetId', id); setIsLoaded(true);
                } catch(e) { setError('Connection failed. Verify ID and public access.'); }
                finally { setLoading(false); }
            };

            if(loading) return <div className="min-h-screen bg-golf-900 text-white flex flex-col items-center justify-center relative overflow-hidden"><PatternBackground /><div className="relative z-10 animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-gold-500 mb-4"></div><p className="font-serif text-lg z-10">Syncing BoysTrip...</p></div>;
            if(!isLoaded) return <ConfigView onSave={load} initialId={sheetId} error={error} />;

            return (
                <div className="antialiased">
                    {view === 'menu' && <MainMenu setView={setView} clearConfig={()=>{localStorage.removeItem('golfSheetId'); setIsLoaded(false);}} settings={settings} />}
                    {view === 'matches' && <MatchesView setView={setView} selectedMatch={match} setSelectedMatch={setMatch} matches={matches} />}
                    {view === 'itinerary' && <ItineraryView setView={setView} goToMatch={(id)=>{setMatch(id); setView('matches');}} itinerary={itinerary} settings={settings} />}
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
